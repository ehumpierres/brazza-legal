<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Brazza Flyer A — Single Print (8.5x5.5)</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        @page {
            size: 8.5in 5.5in;
            margin: 0;
        }
        html, body {
            width: 8.5in;
            height: 5.5in;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: white;
        }
        .flyer {
            width: 8.5in;
            height: 5.5in;
            background: #FAF3E8;
            padding: 28px;
            display: flex;
            position: relative;
            overflow: hidden;
        }
        .left { flex: 1; display: flex; flex-direction: column; justify-content: space-between; padding-right: 20px; }
        .right {
            width: 180px; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #1B4D3E; margin: -28px -28px -28px 0;
            padding: 24px;
        }
        .logo { color: #1B4D3E; font-size: 24px; font-weight: 800; letter-spacing: 3px; margin-bottom: 4px; }
        .tagline { color: #1B4D3E; font-size: 10px; letter-spacing: 0.5px; opacity: 0.6; margin-bottom: 16px; }
        .headline { font-size: 32px; font-weight: 800; color: #1B4D3E; line-height: 1.1; margin-bottom: 12px; }
        .headline span { color: #F26B3A; }
        .subhead { font-size: 14px; color: #1B4D3E; opacity: 0.7; line-height: 1.4; margin-bottom: 16px; }
        .characters { display: flex; gap: 12px; margin-bottom: 8px; }
        .char-wrapper { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .character {
            width: 44px; height: 44px; border-radius: 50%; overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15); border: 2px solid #F26B3A;
            background-color: #1B4D3E;
        }
        .character img { width: 100%; height: 100%; object-fit: cover; }
        .char-name { font-size: 8px; font-weight: 700; color: #1B4D3E; text-align: center; }
        .pick-text { font-size: 11px; color: #1B4D3E; opacity: 0.6; }
        .qr-section { text-align: center; margin-bottom: 16px; }
        .qr-box { background: white; padding: 8px; border-radius: 12px; margin: 0 auto 10px; display: inline-block; }
        .qr-box canvas, .qr-box img { width: 90px !important; height: 90px !important; }
        .scan-text { color: #FFD166; font-size: 14px; font-weight: 800; margin-bottom: 4px; }
        .scan-subtext { color: rgba(255,255,255,0.6); font-size: 10px; }
        .free-badge { background: #F26B3A; color: white; padding: 8px 20px; border-radius: 20px; font-weight: 800; font-size: 14px; }
        .ages { color: rgba(255,255,255,0.5); font-size: 10px; margin-top: 12px; }
        @media print {
            html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>
    <div class="flyer">
        <div class="left">
            <div>
                <div class="logo">BRAZZA</div>
                <div class="tagline">MUSEUM ADVENTURES</div>
            </div>
            <div>
                <div class="headline">Kids bored at the<br>museum? <span>Not<br>anymore.</span></div>
                <div class="subhead">Turn The Met into an epic scavenger hunt with stories, clues, and real treasure to find!</div>
            </div>
            <div>
                <div class="characters">
                    <div class="char-wrapper">
                        <div class="character"><img src="../promo-assets/characters/professor_whiskers.png" alt="Whiskers"></div>
                        <div class="char-name">Whiskers</div>
                    </div>
                    <div class="char-wrapper">
                        <div class="character"><img src="../promo-assets/characters/captain_chrono.png" alt="Chrono"></div>
                        <div class="char-name">Chrono</div>
                    </div>
                    <div class="char-wrapper">
                        <div class="character"><img src="../promo-assets/characters/marina_the_pirate.png" alt="Marina"></div>
                        <div class="char-name">Marina</div>
                    </div>
                    <div class="char-wrapper">
                        <div class="character"><img src="../promo-assets/characters/stella_stargazer.png" alt="Stella"></div>
                        <div class="char-name">Stella</div>
                    </div>
                    <div class="char-wrapper">
                        <div class="character"><img src="../promo-assets/characters/rex_the_explorer.png" alt="Rex"></div>
                        <div class="char-name">Rex</div>
                    </div>
                </div>
                <div class="pick-text">Choose your guide & go!</div>
            </div>
        </div>
        <div class="right">
            <div class="qr-section">
                <div class="qr-box" id="qrcode"></div>
                <div class="scan-text">Scan to download</div>
                <div class="scan-subtext">or search "Brazza" in App Store</div>
            </div>
            <div class="free-badge">FREE!</div>
            <div class="ages">Only available for iPhone</div>
        </div>
    </div>
    <script>
        new QRCode(document.getElementById("qrcode"), {
            text: "https://apps.apple.com/us/app/brazza-museum-adventures/id6759573887?ct=flyer-a&mt=8",
            width: 90, height: 90,
            colorDark: "#1B4D3E", colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
    </script>
</body>
</html>
