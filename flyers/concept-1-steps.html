<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brazza Flyer — Concept 1: 3 Steps</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: #e0e0e0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }
        h1 { color: #1B4D3E; font-size: 24px; }
        .flyer {
            width: 5.5in; height: 4.25in;
            background: linear-gradient(135deg, #1B4D3E 0%, #0A2A1F 100%);
            border-radius: 12px; padding: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex; flex-direction: column;
            position: relative; overflow: hidden;
        }
        .flyer::before {
            content: ''; position: absolute; top: -50px; right: -50px;
            width: 200px; height: 200px;
            background: rgba(255,209,102,0.1); border-radius: 50%;
        }
        .header {
            display: flex; justify-content: space-between;
            align-items: flex-start; margin-bottom: 16px;
        }
        .logo { color: #FFD166; font-size: 28px; font-weight: 800; letter-spacing: 4px; }
        .tagline { color: rgba(255,255,255,0.6); font-size: 11px; letter-spacing: 1px; }
        .qr-placeholder {
            width: 70px; height: 70px; background: white; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; color: #1B4D3E; text-align: center; font-weight: 700;
        }
        .headline { color: white; font-size: 26px; font-weight: 800; line-height: 1.2; margin-bottom: 20px; }
        .headline span { color: #FFD166; }
        .steps { display: flex; gap: 16px; flex: 1; }
        .step {
            flex: 1; background: rgba(255,255,255,0.08);
            border-radius: 12px; padding: 16px; text-align: center;
        }
        .step-number {
            width: 32px; height: 32px; background: #F26B3A; border-radius: 50%;
            color: white; font-weight: 800; font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 10px;
        }
        .step-icon { font-size: 28px; margin-bottom: 8px; }
        .step-text { color: white; font-size: 13px; font-weight: 700; line-height: 1.3; }
        .footer {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 16px; padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .app-store { display: flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.7); font-size: 11px; }
        .app-badge { background: white; color: #1B4D3E; padding: 4px 10px; border-radius: 6px; font-weight: 700; font-size: 10px; }
        .free-badge { background: #2D8B6F; color: white; padding: 6px 14px; border-radius: 20px; font-weight: 800; font-size: 12px; }
    </style>
</head>
<body>
    <h1>Concept 1: 3 Easy Steps (Dark)</h1>
    <div class="flyer">
        <div class="header">
            <div>
                <div class="logo">BRAZZA</div>
                <div class="tagline">MUSEUM ADVENTURES FOR KIDS</div>
            </div>
            <div class="qr-placeholder">SCAN<br>TO GET<br>APP</div>
        </div>
        <div class="headline">Turn today's visit into an <span>adventure!</span></div>
        <div class="steps">
            <div class="step">
                <div class="step-number">1</div>
                <div class="step-icon">📱</div>
                <div class="step-text">Download the free app</div>
            </div>
            <div class="step">
                <div class="step-number">2</div>
                <div class="step-icon">🧭</div>
                <div class="step-text">Pick your character guide</div>
            </div>
            <div class="step">
                <div class="step-number">3</div>
                <div class="step-icon">🏆</div>
                <div class="step-text">Follow clues & find treasure!</div>
            </div>
        </div>
        <div class="footer">
            <div class="app-store">
                <span class="app-badge">App Store</span>
                Search "Brazza"
            </div>
            <div class="free-badge">100% FREE</div>
        </div>
    </div>
</body>
</html>
